name: Stremio FileList
version: "1.4.0"
slug: stremio-filelist
description: Stream torrents from FileList.io through Stremio
url: https://github.com/vladutstoica/stremio-filelist
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  7777/tcp: 7777
ports_description:
  7777/tcp: Stremio addon HTTP server
webui: "http://[HOST]:[PORT:7777]/manifest.json"
map:
  - share:rw
options:
  FILELIST_USER: ""
  FILELIST_PASSKEY: ""
schema:
  FILELIST_USER: str?
  FILELIST_PASSKEY: str?
