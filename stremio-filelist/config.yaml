name: Stremio FileList
version: "1.10.0"
slug: stremio-filelist
description: Stream torrents from FileList.io through Stremio
url: https://github.com/vladutstoica/stremio-filelist
init: false
arch:
  - aarch64
  - amd64
startup: application
boot: auto
host_network: true
map:
  - share:rw
options:
  FILELIST_USER: ""
  FILELIST_PASSKEY: ""
  API_KEY: ""
  BASE_URL: ""
schema:
  FILELIST_USER: str?
  FILELIST_PASSKEY: str?
  API_KEY: str?
  BASE_URL: str?
